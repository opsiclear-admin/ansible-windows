name: windows-controller

on:
  push:
    branches: [main, windows-controller]
  pull_request:
    branches: [main, windows-controller]
  workflow_dispatch:

# Opt in to Node 24 for JavaScript actions now (the runner will force this in
# June 2026 and drop Node 20 in Sept 2026). Eliminates the deprecation banner
# on every step that uses actions/checkout, setup-python, upload/download-artifact.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  import-smoke:
    name: import smoke (py${{ matrix.python }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Import ansible
        run: |
          python -c "import ansible"
          python -c "import ansible.cli"
          python -c "import ansible.executor.task_queue_manager"

      - name: ansible --version
        run: ansible --version

      - name: Record Python + platform info
        run: |
          python --version
          python -c "import sys, platform; print(sys.platform, platform.platform())"
          python -c "import multiprocessing; print('available ctxs:', multiprocessing.get_all_start_methods())"

  linux-regression:
    name: linux regression (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Import smoke (must pass — baseline)
        run: |
          python -c "import ansible"
          python -c "import ansible.cli"
          python -c "import ansible.executor.task_queue_manager"

      - name: ansible --version
        run: ansible --version

  ansiballz-hash-windows:
    name: AnsiballZ hash (windows)
    runs-on: windows-2022
    env:
      PYTHONUTF8: '1'
    outputs:
      outer_sha256: ${{ steps.hash.outputs.outer_sha256 }}
      inner_sha256: ${{ steps.hash.outputs.inner_sha256 }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Build payload + hashes + member list
        id: hash
        shell: bash
        run: |
          python hacking/windows-controller/ansiballz_hash.py | tee ansiballz.out
          echo "outer_sha256=$(grep '^sha256=' ansiballz.out | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "inner_sha256=$(grep '^inner_zip_sha256=' ansiballz.out | cut -d= -f2)" >> "$GITHUB_OUTPUT"
      - name: Upload payload summary
        uses: actions/upload-artifact@v5
        with:
          name: ansiballz-windows
          path: ansiballz.out

  ansiballz-hash-linux:
    name: AnsiballZ hash (linux)
    runs-on: ubuntu-latest
    outputs:
      outer_sha256: ${{ steps.hash.outputs.outer_sha256 }}
      inner_sha256: ${{ steps.hash.outputs.inner_sha256 }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Build payload + hashes + member list
        id: hash
        run: |
          python hacking/windows-controller/ansiballz_hash.py | tee ansiballz.out
          echo "outer_sha256=$(grep '^sha256=' ansiballz.out | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "inner_sha256=$(grep '^inner_zip_sha256=' ansiballz.out | cut -d= -f2)" >> "$GITHUB_OUTPUT"
      - name: Upload payload summary
        uses: actions/upload-artifact@v5
        with:
          name: ansiballz-linux
          path: ansiballz.out

  winrm-self-target:
    name: WinRM self-target smoke (py${{ matrix.python }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python: ['3.13']
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core + WinRM transport
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pywinrm pypsrp

      - name: Install ansible.windows collection
        run: ansible-galaxy collection install ansible.windows

      - name: Enable WinRM on this runner
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Enable-PSRemoting -Force
          Set-Item WSMan:\localhost\Service\Auth\Basic -Value $true
          Set-Item WSMan:\localhost\Service\AllowUnencrypted -Value $true
          Get-Service WinRM | Select Status,StartType
          # WinRM can accept the listener config before the HTTP endpoint is
          # fully ready. Wait until a TCP probe on 5985 succeeds so the first
          # Ansible task doesn't hit a transient auth 500 and die.
          for ($i = 0; $i -lt 30; $i++) {
              try {
                  $r = Test-NetConnection -ComputerName 127.0.0.1 -Port 5985 -WarningAction SilentlyContinue
                  if ($r.TcpTestSucceeded) { Write-Host "WinRM HTTP listener ready after $i s"; break }
              } catch {}
              Start-Sleep -Seconds 1
          }

      - name: Create a test local account for WinRM
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # Random 20-char password avoiding dictionary-match heuristics
          # Windows Server can otherwise reject passwords that contain the username or "password".
          $pw_plain = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 18 | ForEach-Object {[char]$_}) + '!A9'
          $pw = ConvertTo-SecureString $pw_plain -AsPlainText -Force
          New-LocalUser -Name 'ansibleci' -Password $pw -PasswordNeverExpires -AccountNeverExpires | Out-Null
          Add-LocalGroupMember -Group 'Administrators' -Member 'ansibleci'
          # Write the generated password to a file the next step will read.
          # Note: this file stays on the ephemeral CI runner; it is not an artifact.
          $pw_plain | Out-File -NoNewline -Encoding ascii "$env:RUNNER_TEMP\ansibleci_pw.txt"

      - name: Write inventory
        shell: bash
        run: |
          mkdir -p _ci
          PW=$(cat "$RUNNER_TEMP/ansibleci_pw.txt")
          cat > _ci/winrm_inv.yml <<EOF
          all:
            hosts:
              winlocal:
                ansible_connection: winrm
                ansible_host: 127.0.0.1
                ansible_user: ansibleci
                ansible_password: "$PW"
                ansible_port: 5985
                ansible_winrm_transport: basic
                ansible_winrm_scheme: http
                ansible_winrm_server_cert_validation: ignore
          EOF

      - name: Write 5-task WinRM playbook
        shell: bash
        run: |
          cat > _ci/winrm_smoke.yml <<'EOF'
          ---
          - hosts: winlocal
            gather_facts: false
            tasks:
              # First connect can still race WinRM's credential subsystem right
              # after Enable-PSRemoting even with the TCP probe in the setup
              # step. Retry the ping rather than let a transient auth 500 kill
              # the whole job.
              - name: ping (retry to absorb WinRM warmup)
                ansible.windows.win_ping:
                register: ping_res
                retries: 5
                delay: 3
                until: ping_res is succeeded
              - name: whoami
                ansible.windows.win_whoami:
              - name: gather minimal facts
                ansible.builtin.setup:
                  gather_subset: min
              - name: assert windows
                ansible.builtin.assert:
                  that:
                    - ansible_os_family == 'Windows'
                    - ansible_hostname is defined
              - name: final marker
                ansible.builtin.debug:
                  msg: "winrm self-target green on {{ ansible_hostname }}"
          EOF

      - name: Run WinRM smoke playbook
        shell: bash
        run: |
          ansible-playbook -i _ci/winrm_inv.yml _ci/winrm_smoke.yml

  ssh-self-target:
    name: SSH self-target smoke (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Set up sshd on this runner
        run: |
          sudo systemctl enable --now ssh
          ssh-keygen -t ed25519 -f _ci_key -N ''
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          cat _ci_key.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          ssh-keyscan -H 127.0.0.1 >> ~/.ssh/known_hosts

      - name: Write inventory
        run: |
          mkdir -p _ci
          cat > _ci/ssh_inv.yml <<'EOF'
          all:
            hosts:
              sshlocal:
                ansible_connection: ssh
                ansible_host: 127.0.0.1
                ansible_user: runner
                ansible_ssh_private_key_file: ./_ci_key
                ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
                ansible_python_interpreter: /usr/bin/python3
          EOF

      - name: Write 5-task SSH playbook
        run: |
          cat > _ci/ssh_smoke.yml <<'EOF'
          ---
          - hosts: sshlocal
            gather_facts: false
            tasks:
              - name: ping
                ansible.builtin.ping:
              - name: uname
                ansible.builtin.command: uname -a
                changed_when: false
                register: uname_out
              - name: assert linux
                ansible.builtin.assert:
                  that:
                    - "'Linux' in uname_out.stdout"
              - name: templated copy
                ansible.builtin.copy:
                  content: "ci-smoke-{{ 999 | random }}"
                  dest: /tmp/ci_smoke.txt
                  mode: '0644'
              - name: slurp + decode + cleanup
                block:
                  - ansible.builtin.slurp:
                      src: /tmp/ci_smoke.txt
                    register: slurp_out
                  - ansible.builtin.assert:
                      that:
                        - "'ci-smoke-' in (slurp_out.content | b64decode)"
                  - ansible.builtin.file:
                      path: /tmp/ci_smoke.txt
                      state: absent
          EOF

      - name: Run SSH smoke playbook
        run: |
          ansible-playbook -i _ci/ssh_inv.yml _ci/ssh_smoke.yml

  compare-ansiballz:
    name: cross-platform AnsiballZ byte-identity
    runs-on: ubuntu-latest
    needs: [ansiballz-hash-windows, ansiballz-hash-linux]
    steps:
      - name: Pull summaries
        uses: actions/download-artifact@v6
        with:
          path: summaries
      - name: Compare AnsiballZ hashes + member lists
        run: |
          WIN_OUTER='${{ needs.ansiballz-hash-windows.outputs.outer_sha256 }}'
          WIN_INNER='${{ needs.ansiballz-hash-windows.outputs.inner_sha256 }}'
          LIN_OUTER='${{ needs.ansiballz-hash-linux.outputs.outer_sha256 }}'
          LIN_INNER='${{ needs.ansiballz-hash-linux.outputs.inner_sha256 }}'
          echo "Windows outer=${WIN_OUTER} inner=${WIN_INNER}"
          echo "Linux   outer=${LIN_OUTER} inner=${LIN_INNER}"
          if [ -z "$WIN_INNER" ] || [ -z "$LIN_INNER" ]; then
            echo "Missing hash output from one of the build lanes"
            exit 1
          fi

          # Shared-member CRC match is the required gate: every zip entry
          # present on both platforms must agree on size + CRC. Structural
          # divergence (entries only on one side) is tracked in
          # docs/windows-controller/PHASE_4_NOTES.md as a known follow-up and
          # is reported here as a warning, not a failure.
          python3 - <<'PY'
          import json, sys
          def members(p):
              with open(p) as fh:
                  for line in fh:
                      if line.startswith('inner_zip_members='):
                          return {name: (size, crc) for name, size, crc in json.loads(line.split('=', 1)[1])}
              return {}
          w = members('summaries/ansiballz-windows/ansiballz.out')
          l = members('summaries/ansiballz-linux/ansiballz.out')
          shared = set(w) & set(l)
          mismatches = [n for n in sorted(shared) if w[n] != l[n]]
          if mismatches:
              print('::error::Shared members disagree on (size, crc):')
              for n in mismatches:
                  print(f'  {n}: win={w[n]} linux={l[n]}')
              sys.exit(1)
          only_w = sorted(set(w) - set(l))
          only_l = sorted(set(l) - set(w))
          if only_w or only_l:
              print(f'::warning::Structural divergence (see docs/windows-controller/PHASE_4_NOTES.md):')
              if only_w: print('  Only on Windows:', only_w)
              if only_l: print('  Only on Linux:  ', only_l)
          else:
              print('Zip member set is identical across platforms.')
          print(f'Shared members ({len(shared)}) all have matching size + CRC.')
          PY

          if [ "$WIN_OUTER" != "$LIN_OUTER" ]; then
            echo "::warning::Embedded zip bytes match (shared set) but the AnsiballZ wrapper text differs across platforms."
            echo "Windows outer: $WIN_OUTER"
            echo "Linux   outer: $LIN_OUTER"
          fi
          if [ "$WIN_INNER" = "$LIN_INNER" ]; then
            echo "Embedded-zip content is byte-identical across platforms (inner sha256 matches)."
          fi
