name: windows-controller

on:
  push:
    branches: [windows-controller]
  pull_request:
    branches: [windows-controller]
  workflow_dispatch:

jobs:
  import-smoke:
    name: import smoke (py${{ matrix.python }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Import ansible
        run: |
          python -c "import ansible"
          python -c "import ansible.cli"
          python -c "import ansible.executor.task_queue_manager"

      - name: ansible --version
        run: ansible --version

      - name: Record Python + platform info
        run: |
          python --version
          python -c "import sys, platform; print(sys.platform, platform.platform())"
          python -c "import multiprocessing; print('available ctxs:', multiprocessing.get_all_start_methods())"

  linux-regression:
    name: linux regression (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Import smoke (must pass — baseline)
        run: |
          python -c "import ansible"
          python -c "import ansible.cli"
          python -c "import ansible.executor.task_queue_manager"

      - name: ansible --version
        run: ansible --version

  ansiballz-hash-windows:
    name: AnsiballZ hash (windows)
    runs-on: windows-2022
    env:
      PYTHONUTF8: '1'
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Build payload + compute hash
        id: hash
        shell: bash
        run: |
          OUT=$(python hacking/windows-controller/ansiballz_hash.py)
          echo "$OUT"
          HASH=$(echo "$OUT" | grep '^sha256=' | cut -d= -f2)
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"

  ansiballz-hash-linux:
    name: AnsiballZ hash (linux)
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install ansible-core (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Build payload + compute hash
        id: hash
        run: |
          OUT=$(python hacking/windows-controller/ansiballz_hash.py)
          echo "$OUT"
          HASH=$(echo "$OUT" | grep '^sha256=' | cut -d= -f2)
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"

  compare-ansiballz:
    name: cross-platform AnsiballZ byte-identity
    runs-on: ubuntu-latest
    needs: [ansiballz-hash-windows, ansiballz-hash-linux]
    steps:
      - name: Compare AnsiballZ hashes
        run: |
          WIN_HASH='${{ needs.ansiballz-hash-windows.outputs.sha256 }}'
          LIN_HASH='${{ needs.ansiballz-hash-linux.outputs.sha256 }}'
          echo "Windows SHA256: $WIN_HASH"
          echo "Linux   SHA256: $LIN_HASH"
          if [ -z "$WIN_HASH" ] || [ -z "$LIN_HASH" ]; then
            echo "Missing hash output from one of the build lanes"
            exit 1
          fi
          if [ "$WIN_HASH" != "$LIN_HASH" ]; then
            echo "AnsiballZ payload differs between platforms"
            exit 1
          fi
          echo "AnsiballZ payloads are byte-identical across Windows and Linux controllers."
